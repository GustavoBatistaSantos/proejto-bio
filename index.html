<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioScan - Catálogo de Espécies</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
</head>
<body>
    <header>
        <h1>🌿 BioScan</h1>
        <p>Identificação e Catalogação de Fauna e Flora</p>
    </header>

    <main class="container">
        <section class="upload-section">
            <h3>Novo Cadastro</h3>
            <div class="upload-box">
                <input type="file" id="inputFoto" accept="image/*" onchange="processarImagem(event)">
                <img id="preview" src="" alt="Preview" style="display: none;">
            </div>
            
            <div id="statusIA">Carregando Inteligência Artificial...</div>

            <div class="form-group">
                <input type="text" id="nomeEspecie" placeholder="Nome identificado pela IA...">
                <select id="tipoEspecie">
                    <option value="Flora">Flora</option>
                    <option value="Fauna">Fauna</option>
                </select>
                <button id="btnSalvar" onclick="salvarNoBanco()" disabled>Salvar no Catálogo</button>
            </div>
        </section>

        <section class="catalogo-section">
            <h3>Espécies Catalogadas</h3>
            <div id="gridCatalogo" class="grid">
                </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
